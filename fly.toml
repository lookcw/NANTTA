# Fly.io config for NANTTA.
#
# Notes:
# - Single VM, single gunicorn worker. The APScheduler-based MTA poller runs
#   in-process; multiple machines would each poll independently. If you ever
#   need horizontal scaling, move the poller out into a shared cache first.
# - ewr (Newark) is the closest Fly region to the MTA datacenters; keeps the
#   feed-fetch latency low.
# - auto_stop_machines is off because the in-memory cache loses state when the
#   VM stops, and the first request after a cold start would render an empty
#   board for ~10s while the cache primes. A wall display should never cold-start.

app = "nantta"
primary_region = "ewr"

[build]

[env]
  NANTTA_DEBUG = "0"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpus = 1
  cpu_kind = "shared"

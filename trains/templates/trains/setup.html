{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NANTTA — Setup</title>
  <link rel="stylesheet" href="{% static 'trains/style.css' %}">
  <script id="stations-data" type="application/json">{{ stations_json|safe }}</script>
  <script src="{% static 'trains/setup.js' %}" defer></script>
</head>
<body class="setup">
  <header class="setup__header">
    <h1>NANTTA</h1>
    <span class="setup__crumb">setup</span>
    <div class="setup__spacer"></div>
    <a class="setup__link" href="/display">/display</a>
  </header>

  <main class="setup__main">
    <section class="panel panel--picker">
      <h2>Stations</h2>
      <div class="search">
        <input id="search" type="text" placeholder="Search stations or lines (e.g. Times Sq, Q, 14 St)" autocomplete="off" autofocus>
      </div>
      <ul id="search-results" class="results" hidden></ul>

      <div class="selected-head">
        <h3 class="panel__subheader">Selected <span id="selected-count" class="muted"></span></h3>
        <div id="selected-controls" class="selected-controls" hidden>
          <button id="expand-all" type="button">Expand all</button>
          <button id="collapse-all" type="button">Collapse all</button>
        </div>
      </div>
      <ul id="selected" class="selected"></ul>
      <p id="selected-empty" class="muted selected__empty">No stations yet — search above to add one.</p>
    </section>

    <section class="panel panel--options">
      <h2>Display options</h2>

      <div class="options-grid">
        <div class="option option--inline">
          <label for="opt-n">Trains per card</label>
          <input id="opt-n" type="number" min="1" max="20" step="1" value="3">
        </div>
        <div class="option option--inline">
          <label class="switch">
            <input id="opt-d" type="checkbox" checked>
            <span>Show destination</span>
          </label>
        </div>
        <div class="option option--inline">
          <label>Text size</label>
          <div id="size-toggle" class="size-toggle" role="radiogroup">
            <button type="button" data-size="s" aria-pressed="false">S</button>
            <button type="button" data-size="m" aria-pressed="true">M</button>
            <button type="button" data-size="l" aria-pressed="false">L</button>
          </div>
        </div>
      </div>

      <h2 class="panel__subheader">Result</h2>
      <div class="url-preview">
        <code id="url-out"></code>
        <button id="copy-btn" type="button">Copy</button>
      </div>
      <a id="open-btn" class="open-btn" href="#">Open display →</a>
      <p id="open-disabled" class="muted">Add at least one station to open the display.</p>
    </section>
  </main>

  <footer class="page-footer">
    <span class="page-footer__brand">NANTTA</span>
    <span class="page-footer__expand">Not Another NYC Train Time App</span>
  </footer>
</body>
</html>
